services:
  copilot-api:
    build: .
    image: windows-copilot-api
    ports:
      - "18521:18521"
    environment:
      # Bind inside the container; the host port is set under `ports` above.
      HOST: "0.0.0.0"
      PORT: "18521"
      # Self-imposed rate limit (see server/config.py). Tune to your account.
      RATE_LIMIT_RPM: "12"
      RATE_LIMIT_BURST: "4"
    volumes:
      # Persist the signed-in browser profile + cached token across restarts.
      # Sign in once on the host (`python -m copilot login`) so this folder is
      # populated; the container only does the headless token refresh.
      - ./session:/app/session
    extra_hosts:
      # Allows the container to resolve host.docker.internal on Linux hosts
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
